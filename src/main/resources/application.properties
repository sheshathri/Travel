spring.application.name=Car Billing Application
server.port=8080

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'create' to drop and recreate tables (clean start), then change back to 'update'
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Disable H2 Console (using PostgreSQL)
spring.h2.console.enabled=false

# Enable Spring SQL initialization for data.sql
spring.sql.init.mode=never

# PostgreSQL Database Configuration (Supabase Pooler - Transaction Mode)
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.ulkinqbjokgtwimcmklp
spring.datasource.password=Shesha@1412

# Force Hibernate to use the correct dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver

# Good practice for Supabase Pooler (keeps connections lean)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
